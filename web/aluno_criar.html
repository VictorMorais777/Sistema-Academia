<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Novo Aluno</title>
        <link rel="stylesheet" href="estilo.css">
    </head>

    <body>

        <header>
            <h1>🏋️ Sistema Academia</h1>
        </header>

        <nav>
            <a href="index.html">Home</a>
            <a href="AcademiaServlet?action=listarAluno" class="ativo">Alunos</a>
            <a href="AcademiaServlet?action=listarInstrutor">Instrutores</a>
            <a href="AcademiaServlet?action=listarPlano">Planos</a>
            <a href="AcademiaServlet?action=listarTreino">Treinos</a>
            <a href="AcademiaServlet?action=listarPagamento">Pagamentos</a>
            <a href="AcademiaServlet?action=verificarInadimplencia">Inadimplência</a>
        </nav>

        <div class="container">
            <div class="card">
                <h2>Cadastrar Novo Aluno</h2>

                <form action="AcademiaServlet" method="post">
                    <input type="hidden" name="action" value="cadastrarAluno">

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Nome *</label>
                            <input type="text" name="nome" required>
                        </div>

                        <div class="form-group">
                            <label>CPF *</label>
                            <input type="text" name="cpf" placeholder="000.000.000-00" required>
                        </div>

                        <div class="form-group">
                            <label>Data Nascimento *</label>
                            <input type="date" name="dataNascimento" required>
                        </div>

                        <div class="form-group">
                            <label>Telefone</label>
                            <input type="text" name="telefone">
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email">
                        </div>

                        <div class="form-group">
                            <label>Peso (kg) *</label>
                            <input type="number" step="0.1" name="peso" required>
                        </div>

                        <div class="form-group">
                            <label>Altura (m) *</label>
                            <input type="number" step="0.01" name="altura" required>
                        </div>

                        <div class="form-group">
                            <label>Objetivo</label>
                            <select name="objetivo">
                                <option>Hipertrofia</option>
                                <option>Emagrecimento</option>
                                <option>Condicionamento</option>
                                <option>Saude</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select name="status">
                                <option>Ativo</option>
                                <option>Inativo</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>ID Plano *</label>
                            <input type="number" name="idPlano" required>
                        </div>

                        <div class="form-group">
                            <label>ID Instrutor *</label>
                            <input type="number" name="idInstrutor" required>
                        </div>

                        <div class="form-group">
                            <label>ID Treino *</label>
                            <input type="number" name="idTreino" required>
                        </div>

                    </div>

                    <div style="margin-top:16px;display:flex;gap:8px">
                        <button type="submit" class="btn btn-primary">Salvar</button>
                        <a href="AcademiaServlet?action=listarAluno" class="btn btn-secondary">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>

    </body>
</html>
